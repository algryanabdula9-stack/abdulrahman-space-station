<body>
<div class="wrap">
  <nav>
    <div class="logo">🚀 Abdulrahman <span>Explorer's Club</span></div>
    <div class="links">
      <a href="index.html">🏠 Home</a>

  <section class="card form">
    <h1>📚 My Library</h1>
    <p>Add a photo from the camera/gallery or upload a PDF file.</p>

    <label>Title</label>
    <input id="title" placeholder="Example: My Mars Book">

    <label>Description</label>
    <textarea id="description" placeholder="What is this file about?"></textarea>

    <label>Choose photo or PDF</label>
    <input id="fileInput" type="file" accept="image/*,application/pdf">

    <br><br>
    <button class="btn" onclick="uploadFile()">Upload File</button>
    <p id="msg"></p>

    <h2>Library Items</h2>
    <div id="items"></div>
  </section>
</div>

<script src="library.js"></script>
</body>
