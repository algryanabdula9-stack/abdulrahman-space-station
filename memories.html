<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Memories</title><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><div class="sun"></div><div class="moon"></div><div class="rocket-bg">🚀</div><div class="wrap"><nav><div class="logo"><div style="font-size:36px">🚀</div><div>Abdulrahman <small>Explorer's Club</small></div></div><div class="links"><a href="index.html">Home</a><a href="journal.html">Journal</a><a class="active" href="memories.html">Memories</a><a href="library.html">Library</a><a href="nasa.html">NASA</a><a href="#" onclick="logout()">Logout</a></div><div class="badge">🖼️ Memories</div></nav><div class="container"><div class="card"><h1>🖼️ Beautiful Memories</h1><p>Only entries marked as Beautiful Memory appear here.</p><div id="memories">Loading...</div></div></div></div><script src="js/supabase.js"></script><script>
(async()=>{const user=await requireUser(); if(!user)return; const box=document.getElementById('memories'); const {data,error}=await db.from('journal_entries').select('*').eq('category','Beautiful Memory').order('created_at',{ascending:false}); if(error){box.innerHTML='<p class="error">'+error.message+'</p>';return;} box.innerHTML=data.length?data.map(e=>`<div class="entry"><h3>${e.title}</h3><p>${e.content}</p><small>${new Date(e.created_at).toLocaleString()}</small></div>`).join(''):'<p>No beautiful memories yet.</p>';})();
</script></body></html>
